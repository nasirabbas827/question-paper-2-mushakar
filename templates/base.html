<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
    background-color:cyan;
}
nav {
    background-color: #333;
    color: #fff;
    padding: 10px;
}

nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
}

nav li {
    margin-right: 20px;
}

nav a {
    text-decoration: none;
    color: #fff;
}
.dashboard-container {
    max-width: 800px;
    margin: 0 auto;
}

.welcome-message {
    color: #333;
    font-size: 24px;
    margin-bottom: 20px;
}

.courses-header {
    color: #555;
    font-size: 18px;
    margin-bottom: 10px;
}

.course-list {
    list-style: none;
    padding: 0;
}

.course-item {
    border: 1px solid #ddd;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 5px;
}

.course-details {
    margin-bottom: 10px;
}

.detail-label {
    font-weight: bold;
    margin-right: 5px;
}

.course-picture {
    max-width: 100%;
    height: auto;
    border-radius: 5px;
}
.login-container {
    max-width: 400px;
    margin: 0 auto;
    margin-top: 30px;

    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    background-color: #fff;
}

.login-header {
    color: #333;
    font-size: 24px;
    text-align: center;
    margin-bottom: 20px;
}

.error-message {
    color: #d9534f;
    margin-bottom: 10px;
}

.login-form {
    display: flex;
    flex-direction: column;
}

.form-label {
    margin-bottom: 5px;
    font-weight: bold;
}

.form-input {
    padding: 8px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 3px;
}

.form-button {
    padding: 10px;
    background-color: #337ab7;
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background-color 0.3s;
}

.form-button:hover {
    background-color: #286090;
}
h1,h2,h3,h4,h5{
    margin: 30px;
    text-align:center;
}
/* Style for the table */
.submission-table {
    width: 100%;
    border-collapse: collapse;
}

/* Style for table header */
.submission-table th {
    background-color: #f2f2f2;
    padding: 8px;
    text-align: left;
    border: 1px solid #ddd;
}

/* Style for table body */
.submission-table td {
    padding: 8px;
    border: 1px solid #ddd;
}

/* Alternate row color */
.submission-table tbody tr:nth-child(even) {
    background-color: #f9f9f9;
}

/* Hover effect */
.submission-table tbody tr:hover {
    background-color: #f2f2f2;
}

/* Button style */
.btn {
    background-color: #4CAF50;
    color: white;
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 14px;
}

.btn:hover {
    background-color: #45a049;
}

    </style>
    <title>Automatic Question Paper</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="{% url "student_dashboard" %}">Automatic Question</a></li>

            {% if request.session.student_id %}
                <li><a href="{% url 'view_marks' %}">view marks</a></li>
                <li><a href="{% url 'view_notifications' %}">Notifications</a></li>
                <li><a href="{% url 'logout' %}">Logout</a></li>
            {% else %}
                <li><a href="{% url 'login' %}">Login</a></li>
            {% endif %}
        </ul>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
